name: precommit
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  run_precommit:
    name: Run precommit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: ./.github/actions/moshi_build
      - name: Run Ruff check
        run: |
          . env/bin/activate
          ruff check src/kame tests
      - name: Run Ruff format check
        run: |
          . env/bin/activate
          ruff format --check src/kame tests
      - name: Run mypy
        continue-on-error: true
        run: |
          . env/bin/activate
          mypy src/kame
      - run: |
          . env/bin/activate
          export SKIP=flake8-kame
          bash .git/hooks/pre-commit
